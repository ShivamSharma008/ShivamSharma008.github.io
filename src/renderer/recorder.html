<!doctype html>
<html><head><meta charset="utf-8"><title>STER Recorder</title>
<style>
  body{margin:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;background:#161a24;color:#eaeef7;height:100vh;display:flex;align-items:center;padding:0 14px;-webkit-app-region:drag}
  button{-webkit-app-region:no-drag;background:#4f8cff;border:0;color:white;padding:7px 11px;border-radius:6px;font-weight:600;cursor:pointer;margin-right:6px;font-size:12px}
  button.pass{background:#3ec77a}button.fail{background:#ff5b6e}button.end{background:#888}
  .info{margin-left:auto;font-size:11px;color:#9aa3b2;text-align:right;line-height:1.3}
</style></head>
<body>
  <button id="cap">📸 Capture</button>
  <button id="pass" class="pass">✓ Pass</button>
  <button id="fail" class="fail">✗ Fail</button>
  <button id="end" class="end">⏹ End</button>
  <div class="info">
    <div id="step">Step 0</div>
    <div id="who">—</div>
  </div>
<script>
  document.getElementById('cap').onclick  = () => window.ster.capture();
  document.getElementById('pass').onclick = () => window.ster.updateStep('__last__', { status: 'Pass' });
  document.getElementById('fail').onclick = () => window.ster.updateStep('__last__', { status: 'Fail' });
  document.getElementById('end').onclick  = () => window.ster.endSession();
  window.ster.onUpdate(({ steps, meta }) => {
    document.getElementById('step').textContent = `Step ${steps.length}`;
    document.getElementById('who').textContent  = meta.testerName;
    if (steps.length) {
      // rebind pass/fail to the actual last id
      const last = steps[steps.length - 1].id;
      document.getElementById('pass').onclick = () => window.ster.updateStep(last, { status: 'Pass' });
      document.getElementById('fail').onclick = () => window.ster.updateStep(last, { status: 'Fail' });
    }
  });
</script>
</body></html>
